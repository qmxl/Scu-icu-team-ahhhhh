<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的交易 - 校园二手集市</title>
    <style>
        /* --- 全局样式 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f7f8fa; 
            color: #333; 
            padding-bottom: 80px; /* 为底部导航留出空间 */
        }

        /* --- 1. 顶部标题栏 --- */
        .header {
            background: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }

        /* --- 2. Tab 切换栏 --- */
        .tabs {
            display: flex;
            background: white;
            margin-bottom: 10px;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            position: relative;
        }
        .tab-item.active {
            color: #ff6b00; /* 橙色高亮 */
            font-weight: bold;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 3px;
            background: #ff6b00;
            border-radius: 2px;
        }

        /* --- 3. 订单列表容器 --- */
        .order-list {
            padding: 0 15px;
        }

        /* --- 4. 订单卡片样式 --- */
        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        
        /* 左侧图片 */
        .card-img {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #f0f0f0;
            flex-shrink: 0;
        }

        /* 右侧信息 */
        .card-info {
            flex: 1;
            margin-left: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 标题样式 (已修复报错的版本) */
        .card-title {
            font-size: 14px;
            line-height: 1.4;
            color: #333;
            
            /* 多行截断核心代码 */
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2; /* 标准属性 */
            overflow: hidden;
            margin-bottom: 4px;
        }

        /* 价格 */
        .card-price {
            font-size: 16px;
            color: #ff4d4f;
            font-weight: bold;
        }
        .card-price span {
            font-size: 12px;
        }

        /* 底部元数据（交易对象、状态） */
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            margin-top: auto; /* 推到底部 */
        }

        /* 状态标签 */
        .status-tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        .status-pending {
            background-color: #fff7e6;
            color: #ff6b00;
            border: 1px solid #ffd591;
        }
        .status-success {
            background-color: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }

        /* --- 5. 底部导航栏 (蓝色方块风格) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around; /* 均匀分布 */
            align-items: center;
            padding: 10px 5px;
            border-top: 1px solid #eee;
            z-index: 1000;
        }

        .nav-btn {
            /* 对应截图中的蓝色方块 */
            background-color: #5b9bd5; 
            color: white;
            text-decoration: none;
            font-size: 14px;
            
            /* 布局与尺寸 */
            flex: 1; 
            margin: 0 4px; /* 按钮之间的间距 */
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 4px; /* 轻微圆角 */
            
            /* 交互效果 */
            transition: opacity 0.2s;
        }

        .nav-btn:active {
            opacity: 0.8;
        }

        /* 当前页面高亮处理 (可选：加深颜色或加边框) */
        .nav-btn.active {
            background-color: #4a8bc2; /* 稍微深一点的蓝 */
            font-weight: bold;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

    <!-- 顶部标题 -->
    <div class="header">我的交易</div>

    <!-- 切换标签 -->
    <div class="tabs">
        <div class="tab-item active">我买到的</div>
        <div class="tab-item">我卖出的</div>
    </div>

    <!-- 订单列表 -->
    <div class="order-list">
        
        <!-- 订单卡片 1 -->
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="商品图" class="card-img">
            <div class="card-info">
                <div class="card-title">【急出】九成新 iPad Air 4 64G 天蓝色 WiFi版 无划痕 送保护壳</div>
                <div class="card-price"><span>¥</span> 3,200</div>
                <div class="card-meta">
                    <span>交易对象：张同学</span>
                    <span class="status-tag status-pending">待发货</span>
                </div>
            </div>
        </div>

        <!-- 订单卡片 2 -->
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="商品图" class="card-img">
            <div class="card-info">
                <div class="card-title">考研英语一真题解析 2025版 黄皮书 全套资料</div>
                <div class="card-price"><span>¥</span> 45</div>
                <div class="card-meta">
                    <span>交易对象：李同学</span>
                    <span class="status-tag status-success">交易成功</span>
                </div>
            </div>
        </div>

         <!-- 订单卡片 3 -->
         <div class="card">
            <img src="https://via.placeholder.com/150" alt="商品图" class="card-img">
            <div class="card-info">
                <div class="card-title">宜家台灯 暖光 宿舍神器 护眼灯 可充电</div>
                <div class="card-price"><span>¥</span> 29.9</div>
                <div class="card-meta">
                    <span>交易对象：王同学</span>
                    <span class="status-tag status-success">交易成功</span>
                </div>
            </div>
        </div>

    </div>

    <!-- 底部导航栏 (蓝色方块风格) -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-btn">首页</a>
        <a href="publish.html" class="nav-btn">发布</a>
        <!-- 当前页面添加 active 类 -->
        <a href="orders.html" class="nav-btn active">交易</a>
        <a href="profile.html" class="nav-btn">我的</a>
    </div>

</body>
</html>
