<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 校园二手集市</title>
    <style>
        /* --- 全局样式 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f7f8fa; 
            color: #333; 
            line-height: 1.6;
        }

        /* --- 1. 顶部大图展示区 --- */
        .product-image-container {
            width: 100%;
            height: 400px; /* 保持大图展示 */
            background-color: #e0e0e0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- 通用卡片样式 --- */
        .card {
            background: white;
            margin-bottom: 12px;
            padding: 16px;
        }

        /* --- 2. 核心信息区 (价格+标题) --- */
        .info-section {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .currency {
            color: #ff5000;
            font-size: 14px;
            font-weight: bold;
        }

        .price {
            color: #ff5000;
            font-size: 24px;
            font-weight: bold;
            margin-right: 8px;
        }

        .original-price {
            color: #999;
            font-size: 12px;
            text-decoration: line-through;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            line-height: 1.4;
        }

        .tags {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .tag {
            background: #f0f2f5;
            color: #666;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* --- 3. 宝贝详情 & 卖家信息 (合并展示) --- */
        .detail-section {
            background: white;
            padding: 16px;
            min-height: 200px;
        }

        .section-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #333;
            border-left: 3px solid #ff5000;
            padding-left: 8px;
        }

        .description-text {
            font-size: 15px;
            color: #333;
            white-space: pre-wrap; /* 保留换行符 */
            margin-bottom: 30px; /* 与下方卖家信息拉开距离 */
        }

        /* --- 卖家信息卡片 (内嵌样式) --- */
        .seller-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            border: 1px solid #eee;
        }

        .seller-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #ddd;
            margin-right: 12px;
            object-fit: cover;
        }

        .seller-info {
            flex: 1;
        }

        .seller-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .contact-row {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .contact-label {
            margin-right: 6px;
            color: #999;
        }

        .contact-value {
            color: #333;
            font-weight: 500;
            /* 允许长按复制 */
            user-select: text; 
        }

        /* 提示文字 */
        .copy-tip {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 20px;
            padding-bottom: 20px;
        }

    </style>
</head>
<body>

    <!-- 1. 顶部大图 -->
    <div class="product-image-container">
        <!-- 这里使用占位图，实际开发中替换为真实图片URL -->
        <img src="https://via.placeholder.com/400x400/ffcccc/333333?text=Product+Image" alt="商品图片" class="product-image">
    </div>

    <!-- 2. 价格与标题 -->
    <div class="info-section">
        <div class="price-row">
            <span class="currency">¥</span>
            <span class="price">120.00</span>
            <span class="original-price">原价 ¥350</span>
        </div>
        <h1 class="product-title">九成新 iPad Air 4 64G 天蓝色  WiFi版 无拆无修</h1>
        <div class="tags">
            <span class="tag">9成新</span>
            <span class="tag">电子数码</span>
            <span class="tag">面交优先</span>
        </div>
    </div>

    <!-- 3. 宝贝详情 + 卖家联系方式 (直接展示) -->
    <div class="detail-section">
        <div class="section-title">宝贝详情</div>
        <div class="description-text">
            去年双十一买的，一直带壳贴膜使用，保护得很好。
            因为换了Pro所以出掉这个。电池健康度92%，屏幕完美无划痕。
            
            配件有：原装充电器、数据线、还有一个送的保护壳。
            
            仅限校内面交，食堂或者图书馆都可以。
            不讲价了，已经很便宜了。
        </div>

        <!-- 卖家信息区块 -->
        <div class="section-title" style="margin-top: 20px;">卖家信息</div>
        <div class="seller-card">
            <img src="https://via.placeholder.com/100x100/ccccff/333333?text=User" alt="头像" class="seller-avatar">
            <div class="seller-info">
                <div class="seller-name">计算机学院_张三</div>
                <div class="contact-row">
                    <span class="contact-label">微信：</span>
                    <span class="contact-value">ZhangSan_2024</span>
                </div>
                <div class="contact-row">
                    <span class="contact-label">手机：</span>
                    <span class="contact-value">138****1234</span>
                </div>
            </div>
        </div>
        
        <div class="copy-tip">温馨提示：交易前请核实对方学生证，注意资金安全</div>
    </div>

</body>
</html>
