<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园二手交易平台 - 注册</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <h2>校园二手交易平台</h2>
                <p style="font-size: 14px; color: #999; margin-top: 5px;">注册新账号</p>
            </div>
            
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码">
            </div>
            
            <div class="form-group">
                <label>手机号（选填）</label>
                <input type="text" id="phone" placeholder="请输入手机号">
            </div>
            
            <div class="form-group">
                <label>QQ号（选填）</label>
                <input type="text" id="qq" placeholder="请输入QQ号">
            </div>
            
            <button class="btn btn-primary" onclick="handleRegister()">注册</button>
            
            <div class="links">
                <a href="login.html">已有账号？立即登录</a>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script>
        function handleRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const qq = document.getElementById('qq').value.trim();
            
            if (!username || !password) {
                alert('用户名和密码不能为空');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            register(username, password, phone, qq).then(result => {
                if (result.code === 200) {
                    alert('注册成功，请登录');
                    window.location.href = 'login.html';
                } else {
                    alert(result.message);
                }
            }).catch(err => {
                console.error(err);
                alert('注册失败，请检查网络连接');
            });
        }
    </script>
</body>
</html>
