<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置管理 - 校园二手交易平台</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1><a href="index.html">校园二手交易平台</a></h1>
            <nav class="nav">
                <a href="index.html">首页</a>
                <a href="statistics.html">统计分析</a>
                <a href="config.html" class="active">配置管理</a>
                <a href="profile.html">个人中心</a>
            </nav>
            <div class="user-info" id="userInfo">
                <span>请登录</span>
                <a href="login.html" class="btn btn-sm btn-secondary">登录</a>
            </div>
        </div>
    </header>
    
    <main class="container" style="margin-top: 30px;">
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <div class="card-header">
                <h2>系统配置管理</h2>
            </div>
            
            <div id="configList"></div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>© 2024 校园二手交易平台 - 让闲置物品焕发新生</p>
        </div>
    </footer>
    
    <script src="js/api.js"></script>
    <script>
        function init() {
            if (!isLoggedIn()) {
                alert('请先登录');
                window.location.href = 'login.html';
                return;
            }
            
            const user = getUser();
            if (user.role !== 1) {
                alert('您没有权限访问此页面');
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('userInfo').innerHTML = `
                <span>${user.username}</span>
                <button class="btn btn-sm btn-secondary" onclick="handleLogout()">退出</button>
            `;
            
            loadConfig();
        }
        
        function handleLogout() {
            logout();
            window.location.href = 'login.html';
        }
        
        function loadConfig() {
            getConfigList().then(result => {
                if (result.code === 200) {
                    renderConfig(result.data);
                }
            });
        }
        
        function renderConfig(list) {
            const container = document.getElementById('configList');
            
            container.innerHTML = list.map(item => `
                <div class="config-item">
                    <div class="config-info">
                        <div class="config-key">${item.key}</div>
                        <div class="config-desc">${item.description}</div>
                    </div>
                    <div class="config-value">
                        <input type="text" value="${item.value}" id="value-${item.id}" onchange="startEdit(${item.id})">
                        <button class="btn btn-sm btn-primary" onclick="saveConfig(${item.id})">保存</button>
                    </div>
                </div>
            `).join('');
        }
        
        function saveConfig(id) {
            const valueInput = document.getElementById('value-' + id);
            const value = valueInput.value.trim();
            
            getConfigList().then(result => {
                if (result.code === 200) {
                    const config = result.data.find(c => c.id === id);
                    if (config) {
                        updateConfig(config.key, value, config.description).then(res => {
                            if (res.code === 200) {
                                alert('保存成功');
                            } else {
                                alert(res.message);
                            }
                        });
                    }
                }
            });
        }
        
        init();
    </script>
</body>
</html>
