<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 校园二手交易平台</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1><a href="index.html">校园二手交易平台</a></h1>
            <nav class="nav">
                <a href="index.html">首页</a>
                <a href="publish.html">发布商品</a>
                <a href="orders.html">我的交易</a>
                <a href="profile.html" class="active">个人中心</a>
            </nav>
            <div class="user-info" id="userInfo">
                <span>请登录</span>
                <a href="login.html" class="btn btn-sm btn-secondary">登录</a>
            </div>
        </div>
    </header>
    
    <main class="container" style="margin-top: 30px;">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="card-header">
                <h2>个人中心</h2>
            </div>
            
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" disabled>
            </div>
            
            <div class="form-group">
                <label>手机号</label>
                <input type="text" id="phone" placeholder="请输入手机号">
            </div>
            
            <div class="form-group">
                <label>QQ号</label>
                <input type="text" id="qq" placeholder="请输入QQ号">
            </div>
            
            <div class="form-group">
                <label>角色</label>
                <input type="text" id="role" disabled>
            </div>
            
            <div class="form-group">
                <label>注册时间</label>
                <input type="text" id="createdAt" disabled>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="handleSave()">保存修改</button>
                <button class="btn btn-secondary" onclick="window.location.href='index.html'">返回首页</button>
            </div>
            
            <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                <h3>我的发布</h3>
                <div id="myGoods"></div>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>© 2024 校园二手交易平台 - 让闲置物品焕发新生</p>
        </div>
    </footer>
    
    <script src="js/api.js"></script>
    <script>
        function init() {
            if (!isLoggedIn()) {
                alert('请先登录');
                window.location.href = 'login.html';
                return;
            }
            
            const user = getUser();
            document.getElementById('userInfo').innerHTML = `
                <span>${user.username}</span>
                ${user.role === 1 ? '<a href="statistics.html" class="btn btn-sm btn-secondary">管理后台</a>' : ''}
                <button class="btn btn-sm btn-secondary" onclick="handleLogout()">退出</button>
            `;
            
            loadProfile();
            loadMyGoods();
        }
        
        function handleLogout() {
            logout();
            window.location.href = 'login.html';
        }
        
        function loadProfile() {
            const user = getUser();
            getProfile(user.id).then(result => {
                if (result.code === 200) {
                    const data = result.data;
                    document.getElementById('username').value = data.username;
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('qq').value = data.qq || '';
                    document.getElementById('role').value = data.role === 1 ? '管理员' : '普通用户';
                    document.getElementById('createdAt').value = data.created_at;
                }
            });
        }
        
        function loadMyGoods() {
            const user = getUser();
            getGoodsList(1, 10, '', '', user.id).then(result => {
                if (result.code === 200) {
                    const myGoodsContainer = document.getElementById('myGoods');
                    
                    if (result.data.length === 0) {
                        myGoodsContainer.innerHTML = '<p style="color: #999;">暂无发布的商品</p>';
                        return;
                    }
                    
                    myGoodsContainer.innerHTML = result.data.map(item => {
                        const images = item.images ? item.images.split(',') : [];
                        const mainImage = images.length > 0 ? images[0] : '';
                        const statusText = ['已下架', '已上架', '交易中', '已完成'][item.status] || '未知';
                        
                        return `
                            <div class="goods-card-small" onclick="window.location.href='detail.html?id=${item.id}'">
                                <img src="${mainImage || 'https://via.placeholder.com/80'}" style="width: 80px; height: 80px; object-fit: cover;">
                                <div class="info">
                                    <div class="title">${item.name}</div>
                                    <div class="price">¥${item.price.toFixed(2)}</div>
                                    <div style="font-size: 12px; color: #999;">${statusText}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            });
        }
        
        function handleSave() {
            const user = getUser();
            const phone = document.getElementById('phone').value.trim();
            const qq = document.getElementById('qq').value.trim();
            
            updateProfile(user.id, phone, qq).then(result => {
                if (result.code === 200) {
                    user.phone = phone;
                    user.qq = qq;
                    setUser(user);
                    alert('保存成功');
                } else {
                    alert(result.message);
                }
            }).catch(err => {
                console.error(err);
                alert('保存失败');
            });
        }
        
        init();
    </script>
</body>
</html>
