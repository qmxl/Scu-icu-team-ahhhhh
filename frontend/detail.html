<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 校园二手交易平台</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1><a href="index.html">校园二手交易平台</a></h1>
            <nav class="nav">
                <a href="index.html">首页</a>
                <a href="publish.html">发布商品</a>
                <a href="orders.html">我的交易</a>
                <a href="profile.html">个人中心</a>
            </nav>
            <div class="user-info" id="userInfo">
                <span>请登录</span>
                <a href="login.html" class="btn btn-sm btn-secondary">登录</a>
            </div>
        </div>
    </header>
    
    <main class="container" style="margin-top: 30px;">
        <div id="detailContent"></div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>© 2026 校园二手交易平台 - 让闲置物品焕发新生</p>
        </div>
    </footer>
    
    <script src="js/api.js"></script>
    <script>
        let goodsId = 0;
        let goodsData = null;
        
        function init() {
            if (isLoggedIn()) {
                const user = getUser();
                document.getElementById('userInfo').innerHTML = `
                    <span>${user.username}</span>
                    ${user.role === 1 ? '<a href="statistics.html" class="btn btn-sm btn-secondary">管理后台</a>' : ''}
                    <button class="btn btn-sm btn-secondary" onclick="handleLogout()">退出</button>
                `;
            }
            
            const params = new URLSearchParams(window.location.search);
            goodsId = parseInt(params.get('id') || '0');
            
            if (goodsId > 0) {
                loadDetail();
            }
        }
        
        function handleLogout() {
            logout();
            window.location.href = 'login.html';
        }
        
        function loadDetail() {
            getGoodsDetail(goodsId).then(result => {
                if (result.code === 200) {
                    goodsData = result.data;
                    renderDetail();
                } else {
                    document.getElementById('detailContent').innerHTML = '<div style="text-align: center; padding: 50px;">商品不存在</div>';
                }
            });
        }
        
        function renderDetail() {
            const data = goodsData;
            const images = data.images ? data.images.split(',') : [];
            const statusText = ['已下架', '已上架', '交易中', '已完成'][data.status] || '未知';
            const user = getUser();
            const isSeller = user && user.id === data.seller_id;
            const canApply = !isSeller && data.status === 1 && !data.is_locked;
            
            let contactHtml = '';
            if (isSeller) {
                contactHtml = `
                    <div class="contact-section">
                        <h3>我的联系方式</h3>
                        <p>手机号：${data.seller_phone || '未填写'}</p>
                        <p>QQ：${data.seller_qq || '未填写'}</p>
                    </div>
                `;
            } else if (!data.is_locked) {
                contactHtml = `
                    <div class="contact-section">
                        <h3>卖家联系方式</h3>
                        <p>手机号：${data.seller_phone || '未填写'}</p>
                        <p>QQ：${data.seller_qq || '未填写'}</p>
                    </div>
                `;
            } else {
                contactHtml = `
                    <div class="contact-section">
                        <h3>联系方式（已锁单）</h3>
                        <p style="color: #999;">卖家已锁定此订单，暂不展示联系方式</p>
                    </div>
                `;
            }
            
            let actionButtons = '';
            if (isSeller) {
                if (data.status === 1) {
                    actionButtons = `
                        <button class="btn btn-secondary" onclick="handleToggleLock()">${data.is_locked ? '解锁订单' : '锁定订单'}</button>
                        <button class="btn btn-danger" onclick="handleOffShelf()">下架商品</button>
                    `;
                } else if (data.status === 2) {
                    actionButtons = '<button class="btn btn-primary" onclick="handleComplete()">确认完成交易</button>';
                }
            } else if (canApply) {
                actionButtons = '<button class="btn btn-primary" onclick="handleApply()">申请交易</button>';
            }
            
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-wrapper">
                    <div class="detail-images">
                        ${images.map(img => `<div class="image-item"><img src="${img}"></div>`).join('')}
                        ${images.length === 0 ? '<div class="image-item" style="background: #f5f5f5; display: flex; align-items: center; justify-content: center;"><span>暂无图片</span></div>' : ''}
                    </div>
                    
                    <div class="detail-info">
                        <h1>${data.name}</h1>
                        <div class="price-section">
                            <span class="price">¥${data.price.toFixed(2)}</span>
                        </div>
                        <div class="status-row">
                            <span class="status-badge ${data.status === 1 ? 'status-active' : data.status === 2 ? 'status-trading' : 'status-off'}">${statusText}</span>
                            ${data.is_locked ? '<span class="locked-badge">锁单中</span>' : ''}
                        </div>
                        
                        <div class="info-grid">
                            <div>分类：${data.category || '其他'}</div>
                            <div>发布时间：${data.created_at}</div>
                        </div>
                        
                        <div class="description">
                            <h3>商品描述</h3>
                            <p>${data.description}</p>
                        </div>
                        
                        ${contactHtml}
                        
                        <div class="action-buttons">
                            ${actionButtons}
                            <button class="btn btn-secondary" onclick="window.location.href='index.html'">返回首页</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function handleApply() {
            if (!isLoggedIn()) {
                alert('请先登录');
                window.location.href = 'login.html';
                return;
            }
            
            const user = getUser();
            if (confirm('确定要申请交易此商品吗？')) {
                applyTransaction(goodsId, user.id, goodsData.seller_id).then(result => {
                    if (result.code === 200) {
                        alert('申请成功，请等待卖家确认');
                        loadDetail();
                    } else {
                        alert(result.message);
                    }
                });
            }
        }
        
        function handleToggleLock() {
            const newStatus = !goodsData.is_locked;
            toggleLock(goodsId, newStatus).then(result => {
                if (result.code === 200) {
                    alert('操作成功');
                    loadDetail();
                } else {
                    alert(result.message);
                }
            });
        }
        
        function handleOffShelf() {
            if (confirm('确定要下架此商品吗？')) {
                changeGoodsStatus(goodsId, 0).then(result => {
                    if (result.code === 200) {
                        alert('下架成功');
                        loadDetail();
                    } else {
                        alert(result.message);
                    }
                });
            }
        }
        
        function handleComplete() {
            if (confirm('确定要确认完成此交易吗？')) {
                changeGoodsStatus(goodsId, 3).then(result => {
                    if (result.code === 200) {
                        alert('交易完成');
                        loadDetail();
                    } else {
                        alert(result.message);
                    }
                });
            }
        }
        
        init();
    </script>
</body>
</html>
