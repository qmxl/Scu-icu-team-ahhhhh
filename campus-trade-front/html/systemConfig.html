<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统配置</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .config{
            width:1000px;
            margin:30px auto;
        }
        .config-item{
            padding:15px;
            border:1px solid #eee;
            margin:10px 0;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">校园闲置交易平台</div>
            <div class="nav">
                <a href=" ">首页</a >
                <a href="goodsList.html">商品列表</a >
                <a href="publish.html">发布商品</a >
                <a href="mine.html">我的</a >
                <a href="login.html">登录</a >
            </div>
        </div>
    </header>
    <div class="config">
        <h2>管理员‑系统配置页面</h2>
        <div class="config-item">
            <h4>商品分类管理</h4>
            <input type="text" placeholder="新增分类">
            <button>添加</button>
        </div>
        <div class="config-item">
            <h4>敏感关键词过滤配置</h4>
            <input type="text" placeholder="输入违禁词">
            <button>保存配置</button>
        </div>
        <div class="config-item">
            <h4>审核规则设置</h4>
            <p>发布商品全部开启人工审核</p >
            <input type="radio" name="check">开启
            <input type="radio" name="check">关闭
        </div>
    </div>
</body>
</html>
