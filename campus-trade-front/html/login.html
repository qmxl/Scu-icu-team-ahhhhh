<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录注册</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-box{
            width:420px;
            margin:80px auto;
            border:1px solid #ddd;
            padding:30px;
            border-radius:8px;
        }
        .tab{
            display:flex;
        }
        .tab > div{
            width:50%;
            text-align:center;
            font-size:18px;
            padding-bottom:10px;
            border-bottom:2px solid #4096ee;
        }
        .login-box input{
            width:100%;
            height:42px;
            margin:10px 0;
            padding:0 10px;
            font-size:16px;
            border:1px solid #ccc;
        }
        .submit-btn{
            width:100%;
            height:42px;
            background:#4096ee;
            color:#fff;
            border:none;
            font-size:17px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">校园闲置交易平台</div>
            <div class="nav">
                <a href=" ">首页</a >
                <a href="publish.html">发布商品</a >
                <a href="mine.html">我的</a >
                <a href="login.html">登录</a >
            </div>
        </div>
    </header>
    <div class="login-box">
        <div class="tab">
            <div>登录</div>
            <div>注册</div>
        </div>
        <!--登录表单-->
        <input type="text" placeholder="请输入学号">
        <input type="password" placeholder="请输入密码">
        <button class="submit-btn">登录</button>
        <!--注册表单，后期JS控制显示隐藏：学号、昵称、手机号、密码-->
    </div>
</body>
</html>
