<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发布闲置商品</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .publish{
            width:600px;
            margin:40px auto;
        }
        .publish div{
            margin:15px 0;
        }
        .publish input,textarea{
            width:100%;
            padding:10px;
            font-size:16px;
        }
        .submit{
            background:#4096ee;
            color:white;
            border:none;
            height:45px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">校园闲置交易平台</div>
        <div class="nav">
            <a href=" ">首页</a >
            <a href="publish.html">发布商品</a >
            <a href="mine.html">我的</a >
            <a href="login.html">登录</a >
        </div>
    </header>
    <div class="publish">
        <h2>发布闲置物品</h2>
        <div>
            <label>商品名称</label>
            <input type="text" placeholder="输入物品名字">
        </div>
        <div>
            <label>商品价格</label>
            <input type="text" placeholder="输入价格">
        </div>
        <div>
            <label>物品描述</label>
            <textarea rows="6" placeholder="介绍物品情况"></textarea>
        </div>
        <div>
            <input class="submit" type="button" value="提交发布">
        </div>
    </div>
</body>
</html>
