<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园二手交易‑首页</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .count-data{
            width:1000px;
            margin:20px auto;
            display:flex;
            gap:30px;
        }
        .count-item{
            padding:20px 30px;
            background:#f5f7fa;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">校园闲置交易平台</div>
            <div class="nav">
                <a href=" ">首页</a >
                <a href="goodsList.html">商品列表</a >
                <a href="publish.html">发布商品</a >
                <a href="mine.html">我的</a >
                <a href="login.html">登录</a >
            </div>
        </div>
    </header>
    <!--统计板块 PAGE‑002要求：加载统计数据-->
    <div class="count-data">
        <div class="count-item">
            <h3>商品总数</h3>
            <p>26</p >
        </div>
        <div class="count-item">
            <h3>成交订单</h3>
            <p>12</p >
        </div>
        <div class="count-item">
            <h3>待处理事项</h3>
            <p>3</p >
        </div>
    </div>

    <div class="search-box">
        <input type="text" placeholder="搜索想要的物品">
        <button>搜索</button>
    </div>

    <div class="goods-list">
        <div class="goods-item" onclick="location.href='goodsDetail.html'">
            <div class="pic"></div>
            <h4>笔记本电脑</h4>
            <p class="price">¥1200</p >
            <p>自用笔记本，成色完好</p >
        </div>
        <div class="goods-item" onclick="location.href='goodsDetail.html'">
            <div class="pic"></div>
            <h4>课外书籍</h4>
            <p class="price">¥35</p >
            <p>课本参考书，几乎全新</p >
        </div>
    </div>
</body>
</html>
