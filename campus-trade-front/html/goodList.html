<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商品列表</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .filter{
            width:1000px;
            margin:20px auto;
            padding:15px;
            border:1px solid #eee;
        }
        .filter span{
            margin-right:15px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">校园闲置交易平台</div>
            <div class="nav">
                <a href=" ">首页</a >
                <a href="goodsList.html">商品列表</a >
                <a href="publish.html">发布商品</a >
                <a href="mine.html">我的</a >
                <a href="login.html">登录</a >
            </div>
        </div>
    </header>
    <!--筛选条件：分类、价格区间 PAGE‑003要求-->
    <div class="filter">
        <span>分类：</span>
        <select>
            <option>数码产品</option>
            <option>书本资料</option>
            <option>生活用品</option>
        </select>
        <span>价格区间：</span>
        <input type="text" placeholder="最低">‑<input type="text" placeholder="最高">
        <button>筛选查询</button>
    </div>

    <div class="goods-list">
        <div class="goods-item" onclick="location.href='goodsDetail.html'">
            <div class="pic"></div>
            <h4>笔记本电脑</h4>
            <p class="price">¥1200</p >
            <p>发布人：张三｜发布时间：2026‑07‑05</p >
        </div>
        <div class="goods-item" onclick="location.href='goodsDetail.html'">
            <div class="pic"></div>
            <h4>课外书籍</h4>
            <p class="price">¥35</p >
            <p>发布人：李四｜发布时间：2026‑07‑03</p >
        </div>
    </div>
</body>
</html>
